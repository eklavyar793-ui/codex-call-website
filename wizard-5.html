<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Codex Call AI - Agent Wizard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=Geist:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;family=Hanken+Grotesk:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error-container": "#ffdad6",
                    "primary-fixed-dim": "#c0c1ff",
                    "outline": "#908fa0",
                    "surface-container-highest": "#333539",
                    "primary-fixed": "#e1e0ff",
                    "on-tertiary": "#00363e",
                    "error-container": "#93000a",
                    "surface-bright": "#37393e",
                    "on-primary-fixed": "#07006c",
                    "outline-variant": "#464554",
                    "on-primary-fixed-variant": "#2f2ebe",
                    "surface-container": "#1e2024",
                    "surface": "#111318",
                    "on-error": "#690005",
                    "surface-dim": "#111318",
                    "secondary-fixed-dim": "#ddb7ff",
                    "on-surface-variant": "#c7c4d7",
                    "on-secondary": "#490080",
                    "inverse-on-surface": "#2f3035",
                    "on-tertiary-fixed-variant": "#004e5a",
                    "secondary": "#ddb7ff",
                    "on-primary-container": "#0d0096",
                    "on-background": "#e2e2e8",
                    "tertiary-fixed": "#a2eeff",
                    "surface-tint": "#c0c1ff",
                    "secondary-fixed": "#f0dbff",
                    "on-primary": "#1000a9",
                    "primary-container": "#8083ff",
                    "on-surface": "#e2e2e8",
                    "on-secondary-container": "#d6a9ff",
                    "error": "#ffb4ab",
                    "tertiary": "#2fd9f4",
                    "on-secondary-fixed-variant": "#6900b3",
                    "surface-container-lowest": "#0c0e12",
                    "primary": "#c0c1ff",
                    "on-tertiary-fixed": "#001f25",
                    "inverse-surface": "#e2e2e8",
                    "tertiary-container": "#008395",
                    "surface-variant": "#333539",
                    "background": "#111318",
                    "surface-container-high": "#282a2e",
                    "on-tertiary-container": "#000608",
                    "tertiary-fixed-dim": "#2fd9f4",
                    "secondary-container": "#6f00be",
                    "on-secondary-fixed": "#2c0051",
                    "surface-container-low": "#1a1c20",
                    "inverse-primary": "#494bd6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-desktop": "48px",
                    "gutter": "24px",
                    "unit": "8px",
                    "margin-mobile": "20px",
                    "container-max-width": "1440px"
            },
            "fontFamily": {
                    "headline-md": ["Hanken Grotesk"],
                    "body-sm": ["Geist"],
                    "body-md": ["Geist"],
                    "label-md": ["Geist"],
                    "headline-lg": ["Hanken Grotesk"],
                    "headline-lg-mobile": ["Hanken Grotesk"],
                    "headline-xl": ["Hanken Grotesk"],
                    "body-lg": ["Geist"],
                    "mono-md": ["Geist"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "headline-xl": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "mono-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0A0C10;
            color: #e2e2e8;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid transparent;
            border-image: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02)) 1;
        }
        .glass-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            border-color: #c0c1ff;
            box-shadow: 0 0 15px rgba(192, 193, 255, 0.2);
            outline: none;
        }
        .primary-gradient {
            background: linear-gradient(135deg, #494bd6, #6f00be);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .progress-bar-fill {
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/50 dark:bg-surface/50 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-margin-mobile h-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl">bubble_chart</span>
<span class="font-headline-md text-headline-md font-bold text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">Codex Call AI</span>
</div>
<button class="text-on-surface-variant hover:bg-white/5 transition-colors p-2 rounded-full active:scale-95">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<main class="flex-grow pt-24 pb-32 px-margin-mobile relative overflow-hidden">
<!-- Background Animation Shell -->
<div class="absolute inset-0 -z-10 opacity-30">

</div>
<!-- Progress Indicator -->
<div class="mb-10">
<div class="flex justify-between items-end mb-4">
<div>
<p class="font-label-md text-label-md text-primary tracking-widest uppercase">Step 01</p>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mt-1">Business Info</h1>
</div>
<div class="text-right">
<span class="font-mono-md text-mono-md text-on-surface-variant">1 <span class="text-outline">/ 8</span></span>
</div>
</div>
<div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
<div class="progress-bar-fill h-full primary-gradient shadow-[0_0_10px_rgba(192,193,255,0.5)]" style="width: 12.5%;"></div>
</div>
</div>
<!-- Form Section -->
<div class="space-y-gutter">
<div class="glass-card rounded-xl p-gutter">
<form class="space-y-6">
<!-- Business Name -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="business-name">Business Name</label>
<div class="relative">
<input class="glass-input w-full px-4 py-3.5 rounded-xl text-on-surface font-body-md text-body-md placeholder:text-outline/50" id="business-name" placeholder="e.g. Nexus Dynamics" type="text"/>
</div>
</div>
<!-- Industry Dropdown -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="industry">Industry</label>
<div class="relative">
<select class="glass-input w-full px-4 py-3.5 rounded-xl text-on-surface font-body-md text-body-md appearance-none" id="industry">
<option disabled="" selected="" value="">Select industry</option>
<option value="tech">Technology &amp; SaaS</option>
<option value="healthcare">Healthcare</option>
<option value="realestate">Real Estate</option>
<option value="retail">E-commerce &amp; Retail</option>
<option value="finance">Financial Services</option>
<option value="other">Other</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
</div>
</div>
<!-- Primary Goal -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="goal">Primary Goal of Agent</label>
<div class="grid grid-cols-1 gap-3">
<button class="goal-option text-left px-4 py-4 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 transition-all flex items-center gap-3" onclick="selectGoal(this)" type="button">
<span class="material-symbols-outlined text-primary">support_agent</span>
<span class="font-body-md text-body-md text-on-surface">Customer Support</span>
</button>
<button class="goal-option text-left px-4 py-4 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 transition-all flex items-center gap-3" onclick="selectGoal(this)" type="button">
<span class="material-symbols-outlined text-secondary">trending_up</span>
<span class="font-body-md text-body-md text-on-surface">Lead Generation</span>
</button>
<button class="goal-option text-left px-4 py-4 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 transition-all flex items-center gap-3" onclick="selectGoal(this)" type="button">
<span class="material-symbols-outlined text-tertiary">calendar_month</span>
<span class="font-body-md text-body-md text-on-surface">Appointment Setting</span>
</button>
</div>
</div>
</form>
</div>
<!-- Context Hint -->
<div class="flex items-start gap-3 p-4 bg-primary/5 rounded-xl border border-primary/10">
<span class="material-symbols-outlined text-primary text-xl mt-0.5">info</span>
<p class="font-body-sm text-body-sm text-on-surface-variant">This information helps our AI model tailor its tone and vocabulary to your specific market domain.</p>
</div>
</div>
</main>
<!-- Navigation Footer -->
<footer class="fixed bottom-0 w-full z-50 bg-surface/80 dark:bg-surface/80 backdrop-blur-xl border-t border-white/10 px-6 py-4 flex items-center justify-between shadow-2xl">
<button class="flex items-center gap-2 text-outline font-label-md text-label-md hover:text-on-surface transition-colors">
<span class="material-symbols-outlined">close</span>
            Cancel
        </button>
<button class="primary-gradient text-white px-8 py-3 rounded-full font-label-md text-label-md flex items-center gap-2 shadow-lg shadow-primary/20 active:scale-95 transition-transform">
            Next
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
<script>
        function selectGoal(element) {
            // Reset all options
            document.querySelectorAll('.goal-option').forEach(opt => {
                opt.classList.remove('border-primary', 'bg-primary/10');
                opt.classList.add('border-white/10', 'bg-white/5');
            });
            
            // Highlight selected
            element.classList.remove('border-white/10', 'bg-white/5');
            element.classList.add('border-primary', 'bg-primary/10');
            
            // Subtle feedback
            element.classList.add('scale-[0.98]');
            setTimeout(() => element.classList.remove('scale-[0.98]'), 100);
        }

        // Simple enter animation for cards
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.glass-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
