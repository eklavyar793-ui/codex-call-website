<style>

<body class="bg-background text-on-background font-body-md selection:bg-primary/30 min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/50 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-margin-mobile h-16">
<div class="flex items-center gap-3">

<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">Prompt Editor</h1>
</div>
<button class="premium-gradient text-on-primary-container px-4 py-1.5 rounded-full font-label-md active:scale-95 transition-transform">

<!-- Main Content -->

<button class="text-primary font-label-md flex items-center gap-1">

</div>
<div class="flex gap-3 overflow-x-auto scroll-hide pb-2 -mx-2 px-2">
<button class="flex-shrink-0 glass-panel rounded-xl px-4 py-3 text-left w-36 active:scale-95 transition-transform border border-white/10">
<span class="material-symbols-outlined text-tertiary mb-2 block" style="font-variation-settings: 'FILL' 1;">support_agent</span>
<span class="font-label-md block">Customer Support</span>
</button>
<button class="flex-shrink-0 glass-panel rounded-xl px-4 py-3 text-left w-36 active:scale-95 transition-transform border border-white/10">
<span class="material-symbols-outlined text-secondary mb-2 block" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="font-label-md block">Sales Outreach</span>
</button>
<button class="flex-shrink-0 glass-panel rounded-xl px-4 py-3 text-left w-36 active:scale-95 transition-transform border border-white/10">
<span class="material-symbols-outlined text-primary mb-2 block" style="font-variation-settings: 'FILL' 1;">verified_user</span>

<div class="flex justify-between items-end">

<span class="text-body-sm text-outline opacity-70">1,240 tokens</span>
</div>
<div class="relative glass-panel rounded-2xl p-4 input-glow min-h-[320px] flex flex-col bg-black/30 border border-white/10">
<textarea class="w-full h-full bg-transparent border-none focus:ring-0 text-body-md font-body-md placeholder:text-outline/50 resize-none flex-grow" placeholder="Describe how your AI agent should behave, its tone of voice, and the goals it should achieve during the call...">You are an elite Sales Assistant for Codex AI. Your primary goal is to qualify leads for a demo call with our account executives. 

Tone of voice: Professional yet enthusiastic.
Mandatory Variables:
- Mention {{Business_Name}} in the intro.
- Use {{Customer_Name}} throughout naturally.
- Provide the {{Calendar_Link}} if they are qualified.

Qualification criteria:
1. Team size &gt; 10
2. Budget &gt; $5k/mo
3. Direct decision maker</textarea>

</div>
<script>
        // Simple micro-interaction for variable insertion (Visual feedback only)
        document.querySelectorAll('.variable-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                const text = this.innerText.trim();
                const textarea = document.querySelector('textarea');
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const currentVal = textarea.value;
                textarea.value = currentVal.substring(0, start) + text + currentVal.substring(end);
                textarea.focus();
                textarea.setSelectionRange(start + text.length, start + text.length);
                
                // Add a small ripple effect
                this.style.background = 'rgba(192, 193, 255, 0.4)';
                setTimeout(() => {
                    this.style.background = 'rgba(192, 193, 255, 0.1)';
                }, 200);
            });
        });
    </script>
