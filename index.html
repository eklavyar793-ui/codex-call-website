        }

        body {
            background-color: #0A0C10;
            overflow: hidden;
            font-family: 'Geist', sans-serif;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid transparent;
            background-clip: padding-box;
            border-image: linear-gradient(135deg, var(--glass-border) 0%, var(--glass-border-br) 100%) 1;
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            border-color: #c0c1ff;
            box-shadow: 0 0 15px rgba(192, 193, 255, 0.15);
            background: rgba(0, 0, 0, 0.4);
        }

        .btn-primary-gradient {
            background: linear-gradient(135deg, #494bd6 0%, #6f00be 100%);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .btn-primary-gradient:active {
            transform: scale(0.96);
        }

        .shimmer {
            position: relative;
            overflow: hidden;
        }

        .shimmer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg);
            animation: shimmer 6s infinite linear;
        }

        @keyframes shimmer {
            0% { transform: translate(-100%, -100%) rotate(45deg); }
            100% { transform: translate(100%, 100%) rotate(45deg); }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.4;
        }
    </style>

<!-- Mouse Gradient Interaction Script -->
<script>
document.addEventListener('mousemove', (e) => {
    const orbs = document.querySelectorAll('.orb');
    const x = e.clientX;
    const y = e.clientY;

    orbs.forEach((orb, index) => {
        const speed = (index + 1) * 0.05;
        const tx = (x - window.innerWidth / 2) * speed;
        const ty = (y - window.innerHeight / 2) * speed;

        orb.style.transform = `translate(${tx}px, ${ty}px)`;
    });
});
</script>
